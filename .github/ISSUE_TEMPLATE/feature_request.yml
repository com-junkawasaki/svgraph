name: Feature request
description: Request support for an SVG feature, DrawingML preset, or analyzer rule.
title: "[feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What feature should be supported?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - SVG parsing
        - DrawingML preset geometry
        - DrawingML custom geometry
        - Text
        - Paint/stroke
        - Images
        - Analyzer
        - PPTX example
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example input
      description: Paste a representative SVG or DrawingML fragment if available.
      render: xml
  - type: textarea
    id: desired
    attributes:
      label: Desired behavior
      description: Describe the expected conversion or analyzer behavior.
    validations:
      required: true
  - type: textarea
    id: fidelity
    attributes:
      label: Fidelity notes
      description: Mention whether an editable approximation is acceptable, or whether exact visual fidelity is required.
